<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis de Churn - Dashboard Premium</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- D3.js Library -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">📊</span>
                <h1>ChurnViz</h1>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-viz="viz1">
                    <span class="icon">⭕</span> Resumen Global
                </button>
                <button class="nav-item" data-viz="viz2">
                    <span class="icon">🌍</span> Geografía
                </button>
                <button class="nav-item" data-viz="viz3">
                    <span class="icon">👥</span> Edad
                </button>
                <button class="nav-item" data-viz="viz4"><span class="icon">💰</span> Perfil Financiero</button>
                <button class="nav-item" data-viz="viz5"><span class="icon">⏳</span> Tenencia</button>
                <button class="nav-item conclusion-btn" data-viz="viz6" style="margin-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem; color: var(--accent-primary);"><span class="icon">💡</span> Conclusión Estratégica</button>
            </nav>
            <div class="sidebar-footer">
                <p>Dataset: Churn Modelling</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="user-profile">
                    <span class="status-indicator"></span>
                    <span class="user-role">Analista de Datos</span>
                </div>
            </header>

            <section class="viz-container">
                <div class="viz-layout">
                    <div class="viz-text-panel">
                        <h2 id="viz-title" class="chart-title">Resumen de Fidelidad de Clientes</h2>
                        <div id="viz-description" class="intro-box">
                            <p>Cargando datos...</p>
                        </div>
                    </div>
                    <div class="viz-chart-panel">
                        <div id="chart-area">
                            <!-- Las visualizaciones se inyectarán aquí -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/viz1.js"></script>
    <script src="js/viz2.js"></script>
    <script src="js/viz3.js"></script>
    <script src="js/viz4.js"></script>
    <script src="js/viz5.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
